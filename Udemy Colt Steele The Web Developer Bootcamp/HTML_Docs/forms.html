<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practicing Forms</title>
    <style>
      div {
        margin: 10px 0;
      }

      form {
        margin: 0 0 10px;
      }
    </style>
  </head>
  <body>
    <h1>Forms Demo</h1>

    <!-- The attribute action determines where the form will be sent -->
    <form action="/tacos">
      <div>
        <label for="Name">Enter your name: </label>
        <input type="text" placeholder="First Name" id="Name" name="name" />
      </div>
      <div>
        <label for="password">Enter your password: </label>
        <input
          type="password"
          placeholder="password"
          id="password"
          name="password"
        />
      </div>
      <div>
        <label for="color">Choose your favorite color: </label>
        <input type="color" id="color" name="favColor" />
      </div>
      <!-- The number type is like text, but you can ONLY place numbers into the input bar -->
      <div>
        <label for="age">Enter your age: </label>
        <input
          type="number"
          placeholder="I don't know. Age?"
          id="age"
          name="age"
        />
      </div>
      <!-- This is a regular button, and will not submit becuase of its type attribute -->
      <button type="button">Won't submit</button>
      <!-- This button submits because it's defualt type attribute is "submit" -->
      <button>I will submit</button>
      <!-- This input type will form a button that will also submit -->
      <input type="submit" value="I too shall submit" />
      <!-- All buttons will submit to the action attribute "/tacos" found in the form element above -->
    </form>

    <!-- because this button is located outside of the form element, it will not submit anywhere -->
    <button>Outside of the form</button><br />
    <br />
    <h2>Search Inputs</h2>
    <form action="https://www.reddit.com/search">
      <input type="text" placeholder="Search Reddit" id="Reddit" name="q" />
      <button>Search</button>
      <label for="Reddit">Reddit</label>
    </form>
    <form action="https://www.google.com/search">
      <input type="text" placeholder="Search Google" id="Google" name="q" />
      <button>Search</button>
      <label for="Google">Google</label>
    </form>
    <form action="https://www.youtube.com/results">
      <input
        type="text"
        placeholder="Search Youtube"
        id="Youtube"
        name="search_query"
      />
      <button>Search</button>
      <label for="Youtube">YouTube</label>
    </form>
    <form action="https://www.bing.com/search">
      <input type="text" placeholder="Search Bing" id="Bing" name="q" />
      <button>Search</button>
      <label for="Bing">Bing</label>
    </form>

    <h2>Checkbox inputs</h2>

    <form action="/check">
      <input type="checkbox" id="ToS" name="ToS" />
      <label for="ToS">I read the terms of service</label>
      <br />
      <br />
      <div id="radioButtons">
        <input
          type="radio"
          id="thinking"
          name="radio_buttons"
          value="thinking"
          checked
        />
        <label for="thinking">I'm thinking about it, gimme a minute!</label>
        <br />

        <input type="radio" id="agree_tos" name="radio_buttons" value="agree" />
        <label for="agree_tos">I agree to terms of sercive</label>
        <br />

        <input
          type="radio"
          id="disagree_tos"
          name="radio_buttons"
          value="disagree"
        />
        <label for="disagree_tos">I don't agree, get out of my face</label>
        <br />
        <br />
      </div>
      <div id="MyLoveInterests">
        <br />

        <label for="Pizza">How much do you love pizza?!</label><br /><br />

        <span>Do you love it this much?</span>
        <input
          type="range"
          min="0"
          max="100"
          id="Pizza"
          name="ILovePizzaThisMuch"
          step="2"
          value="50"
        />
        <span>Or this much?!</span><br /><br />

        <label for="select_animal">Please Choose your favorite animal</label>
        <select name="animal" id="select_animal">
          <option value="">Choose one of these</option>
          <option value="Dog">Dog</option>
          <option value="cat">cat</option>
          <option value="horse">horse</option>
          <option value="Giraffe">Giraffe</option>
          <option value="None of your business">
            None of your business
          </option></select
        ><br /><br />
        <label for="explain">Care to explain your answers?</label><br />
        <textarea
          name="answersExplained"
          id="explain"
          rows="8"
          cols="30"
          placeholder="If you lie, we'll know"
        ></textarea>
      </div>
      <br />

      <input type="submit" />
    </form>
  </body>
</html>
